server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: student-course-system

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/student_course_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: Z12345.

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.scs.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: student-course-system-secret-key-2024-abcdefghijklmnopqrstuvwxyz
  expire: 86400000  # 24小时，单位毫秒
  tokenPrefix: Bearer
  tokenHeader: Authorization

# 项目自定义配置
scs:
  # 默认密码
  defaultPassword: 123456
  # 跨域配置
  cors:
    allowedOrigins: "*"
    allowedMethods: "*"
    allowedHeaders: "*"
    maxAge: 3600
